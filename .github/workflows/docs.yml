# Docs — documentation build and deploy
#
# Scope:    Runs on push to main (deploys dev alias) and version tags (deploys stable).
#           Uses the pixi docs environment for reproducible builds.
# Jobs:     deploy (mike + mkdocs)
name: Docs

on:
  push:
    branches:
      - main
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Docs
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pages: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: true # TODO: is this needed?

      - name: 🔧 Set up pixi
        uses: prefix-dev/setup-pixi@1b2de7f3351f171c8b4dfeb558c639cb58ed4ec0 # v0.9.5
        with:
          environments: docs

      - name: Configure Git user
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      # TODO: Check whether this cache is actually used for building the docs
      # - name: Restore shared data cache
      #   uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      #   with:
      #     path: data/
      #     key: "${{ runner.os }}-data-${{ hashFiles('tests/conftest.py') }}"
      #     restore-keys: |
      #       "${{ runner.os }}-data-"

      - name: Deploy docs
        run: |
          VERSION=$(echo $GITHUB_REF | sed 's/refs\/tags\///' | sed 's/refs\/heads\///')
          echo "Deploying version $VERSION"
          # Check if the version is a stable release
          # Meaning that starts with "v" and contains only numbers and dots
          if [[ $GITHUB_REF == refs/tags/* ]] && [[ $VERSION =~ ^v[0-9.]+$ ]]; then
            pixi run -e docs mike deploy --push --update-aliases $VERSION stable
            pixi run -e docs mike set-default --push stable
            echo "Deployed stable version $VERSION (stable)"

          elif [[ $GITHUB_REF == refs/heads/main ]]; then
            pixi run -e docs mike deploy --push dev
            pixi run -e docs mike set-default --push dev
            echo "Deployed development version (dev) from main"
          fi
